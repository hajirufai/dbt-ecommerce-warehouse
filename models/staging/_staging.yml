version: 2

sources:
  - name: raw
    description: "Raw e-commerce data"
    tables:
      - name: orders
      - name: customers
      - name: products
      - name: payments

models:
  - name: stg_orders
    description: "Cleaned and typed order records"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['PENDING', 'PROCESSING', 'SHIPPED', 'DELIVERED', 'CANCELLED', 'RETURNED']
      - name: net_amount
        tests:
          - not_null

  - name: stg_customers
    description: "Cleaned customer profiles"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null

  - name: stg_products
    description: "Cleaned product catalog"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: price
        tests:
          - not_null

  - name: stg_payments
    description: "Cleaned payment transactions"
    columns:
      - name: payment_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
