name: 'ecommerce_warehouse'
version: '1.0.0'
config-version: 2

profile: 'ecommerce'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  ecommerce_warehouse:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      core:
        +materialized: table
      marketing:
        +materialized: table
      finance:
        +materialized: table
        +tags: ['finance', 'daily']

seeds:
  ecommerce_warehouse:
    +schema: seeds
